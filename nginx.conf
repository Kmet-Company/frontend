server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Use Docker's embedded DNS server so upstream hostnames are resolved at
  # request time instead of nginx startup. Without this, a missing or
  # still-starting `api` / `gateway` container would crash nginx on boot
  # with "host not found in upstream".
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Gzip compression for text assets
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # Long-term cache for hashed build assets
  location ~* \.(?:css|js|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # Never cache the entry HTML
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # Backend REST API (PostgREST). Browser talks to same origin so there's no
  # CORS; nginx forwards to the `api` service on the internal docker network.
  # The trailing slash on proxy_pass strips the /api prefix, so
  #   /api/alert?select=id,title  ->  http://api:3000/alert?select=id,title
  # `api` is part of the same docker-compose stack as nginx, so a literal
  # upstream is fine here — compose won't start `web` until `api` is healthy.
  location /api/ {
    proxy_pass         http://api:3000/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # AI gateway (FastAPI): orchestrates camera clips -> violence model.
  # /gateway/health -> http://gateway:8000/health
  # The gateway lives in a separate stack and may not be running, so we
  # resolve its hostname at request time via the `resolver` directive above.
  # When `proxy_pass` uses a variable, nginx does NOT auto-rewrite the URI,
  # so we strip the /gateway prefix ourselves with `rewrite ... break`.
  location /gateway/ {
    # `rewrite ... break` stops later rewrite-module directives in this block,
    # so `set $gateway_upstream` must run *before* rewrite or proxy_pass sees "".
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gateway_upstream http://gateway:8000;
    rewrite ^/gateway/?(.*)$ /$1 break;
    proxy_pass         $gateway_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    client_max_body_size 100m;
    proxy_connect_timeout 600s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;
  }

  # SPA history API fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Minimal security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
}
