# Vigilant Architect — app stack.
#
# Public entrypoint is served by the Traefik instance running on the host
# via the external `proxy` network. Only the `web` container joins that
# network; `db` and `api` stay on the internal `vigilant-net` and are not
# reachable from the internet.
#
#   https://vireal.club        -> nginx (Angular SPA + /api proxy to PostgREST)
#
# One-time: Traefik expects external Docker network `proxy` (create if missing):
#   docker network create proxy
#
# Rebuild + run full stack (DB, PostgREST, AI model, gateway, nginx UI on :8080):
#   docker compose up --build -d
#
# App (no Traefik): http://127.0.0.1:8080/  · PostgREST :3000 · gateway :8000
#
# To run the gateway without the model (mock responses), set AI_VISION_URL empty
# in a `.env` file next to this compose file, e.g. AI_VISION_URL=
#
# Local Angular: `npm run dev:db-api` then `npm start` (proxy: proxy.conf.js).
# Or one shot: `npm run start:docker-api`. Open http://localhost:4200
#
#   docker compose up -d db api ai-vision gateway
#
# Set STATIC_ASSET_BASE so the gateway can fetch MP4s from ng serve (not nginx `web`):
#   echo 'STATIC_ASSET_BASE=http://host.docker.internal:4200' >> .env
# (gateway includes extra_hosts so host.docker.internal resolves on Linux.)

services:
  db:
    image: postgres:17
    container_name: vigilant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vigilant
      POSTGRES_PASSWORD: vigilant
      POSTGRES_DB: vigilant
    # DB is not exposed to the public internet. Bind to localhost on the VM
    # so you can still tunnel in with `ssh -L 5442:localhost:5442 vm` if
    # you need psql / DBeaver access. Remove this whole block for full lockdown.
    ports:
      - "127.0.0.1:5442:5432"
    volumes:
      - vigilant-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigilant -d vigilant"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [vigilant-net]

  api:
    image: postgrest/postgrest:v12.2.3
    container_name: vigilant-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator@db:5432/vigilant
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: https://vireal.club/api
      PGRST_SERVER_PORT: 3000
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000"
    networks: [vigilant-net]

  gateway:
    build: ../gateway
    image: vigilant-gateway:latest
    container_name: vigilant-gateway
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      ai-vision:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      POSTGREST_URL: http://api:3000
      # In full stack, nginx `web` serves public/*. For `npm start`, set in .env:
      # STATIC_ASSET_BASE=http://host.docker.internal:4200
      STATIC_ASSET_BASE: ${STATIC_ASSET_BASE:-http://web}
      AI_VISION_URL: ${AI_VISION_URL:-http://ai-vision:8000}
      # Periodic analysis (seconds). 0 = disabled; use POST /gateway/analyze/{code} from UI.
      ANALYSIS_INTERVAL_SEC: ${ANALYSIS_INTERVAL_SEC:-0}
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    networks: [vigilant-net]

  ai-vision:
    build:
      context: ../ai
      dockerfile: Dockerfile
    image: vigilant-ai-vision:latest
    container_name: vigilant-ai-vision
    restart: unless-stopped
    expose:
      - "8000"
    # Host tools / gateway-on-host: curl http://127.0.0.1:8001/health  →  set AI_VISION_URL=http://127.0.0.1:8001
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - vigilant-hf-cache:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\", timeout=5)"',
        ]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 600s
    networks: [vigilant-net]

  web:
    build: .
    image: vigilant-architect:latest
    container_name: vigilant-architect
    restart: unless-stopped
    depends_on:
      - api
      - gateway
    ports:
      - "127.0.0.1:8080:80"
    environment:
      API_URL: http://api:3000
    # Traefik's docker provider skips containers whose health status isn't
    # `healthy`. The Dockerfile's wget-based healthcheck has been flaky on
    # BusyBox and leaves the container stuck in `starting`, so disable it
    # at the compose layer and let the restart policy + Traefik handle it.
    healthcheck:
      disable: true
    networks:
      - vigilant-net     # so nginx can proxy /api/ to the `api` service
      - proxy            # so Traefik on the host can route to it
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=proxy'

      - 'traefik.http.routers.vigilant-web.rule=Host(`vireal.club`)'
      - 'traefik.http.routers.vigilant-web.entrypoints=websecure'
      - 'traefik.http.routers.vigilant-web.priority=100'
      - 'traefik.http.routers.vigilant-web.tls.certresolver=le'

      - 'traefik.http.services.vigilant-web.loadbalancer.server.port=80'

volumes:
  vigilant-pgdata:
  vigilant-hf-cache:

networks:
  vigilant-net:
    driver: bridge
  proxy:
    external: true
    name: proxy
