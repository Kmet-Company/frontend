# ViReAl — app stack.
#
# Public entrypoint is served by the Traefik instance running on the host
# via the external `proxy` network. Only the `web` container joins that
# network; `db` and `api` stay on the internal `vireal-net` and are not
# reachable from the internet.
#
#   https://vireal.club        -> nginx (Angular SPA + /api proxy to PostgREST)
#
# Rebuild + deploy:
#   docker compose up --build -d

services:
  db:
    image: postgres:17
    container_name: vireal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vireal
      POSTGRES_PASSWORD: vireal
      POSTGRES_DB: vireal
    # DB is not exposed to the public internet. Bind to localhost on the VM
    # so you can still tunnel in with `ssh -L 5442:localhost:5442 vm` if
    # you need psql / DBeaver access. Remove this whole block for full lockdown.
    ports:
      - "127.0.0.1:5442:5432"
    volumes:
      - vireal-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vireal -d vireal"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [vireal-net]

  api:
    image: postgrest/postgrest:v12.2.3
    container_name: vireal-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator@db:5432/vireal
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: https://vireal.club/api
      PGRST_SERVER_PORT: 3000
    expose:
      - "3000"
    # Local dev: expose PostgREST on the host so the Android app (emulator
    # via 10.0.2.2, or a physical device via the host's LAN / Tailscale IP)
    # can POST guest reports directly. Bound on all interfaces for dev
    # convenience — remove or restrict for shared machines.
    # Production traffic still goes through nginx /api/ in the `web` service.
    ports:
      - "3001:3000"
    networks: [vireal-net]

  gateway:
    build: ../gateway
    image: vireal-gateway:latest
    container_name: vireal-gateway
    restart: unless-stopped
    depends_on:
      - api
    environment:
      POSTGREST_URL: http://api:3000
      # Set to http://ai-vision:8000 when running `docker compose --profile ai up`
      AI_VISION_URL: ${AI_VISION_URL:-}
      # Periodic analysis (seconds). 0 = disabled; use POST /gateway/analyze/{code} from UI.
      ANALYSIS_INTERVAL_SEC: ${ANALYSIS_INTERVAL_SEC:-0}
    expose:
      - "8000"
    networks: [vireal-net]

  ai-vision:
    profiles: ["ai"]
    build:
      context: ../ai
      dockerfile: Dockerfile
    image: vireal-ai-vision:latest
    container_name: vireal-ai-vision
    restart: unless-stopped
    expose:
      - "8000"
    networks: [vireal-net]

  web:
    build: .
    image: vireal:latest
    container_name: vireal-web
    restart: unless-stopped
    depends_on:
      - api
      - gateway
    environment:
      API_URL: http://api:3000
    # Local dev: expose the Angular SPA on http://localhost:8080 so we can
    # open the dashboard without Traefik. Production still routes via
    # Traefik on :443.
    ports:
      - "8080:80"
    # Traefik's docker provider skips containers whose health status isn't
    # `healthy`. The Dockerfile's wget-based healthcheck has been flaky on
    # BusyBox and leaves the container stuck in `starting`, so disable it
    # at the compose layer and let the restart policy + Traefik handle it.
    healthcheck:
      disable: true
    networks:
      - vireal-net      # so nginx can proxy /api/ to the `api` service
      - proxy           # so Traefik on the host can route to it
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=proxy'

      - 'traefik.http.routers.vireal-web.rule=Host(`vireal.club`)'
      - 'traefik.http.routers.vireal-web.entrypoints=websecure'
      - 'traefik.http.routers.vireal-web.priority=100'
      - 'traefik.http.routers.vireal-web.tls.certresolver=le'

      - 'traefik.http.services.vireal-web.loadbalancer.server.port=80'

volumes:
  vireal-pgdata:

networks:
  vireal-net:
    driver: bridge
  proxy:
    external: true
    name: proxy
