# ViReAl — app stack.
#
# Public entrypoint is served by the Traefik instance running on the host
# via the external `proxy` network. Only the `web` container joins that
# network; `db` and `api` stay on the internal `vireal-net` and are not
# reachable from the internet.
#
#   https://vireal.club        -> nginx (Angular SPA + /api proxy to PostgREST)
#
# One-time: Traefik expects external Docker network `proxy` (create if missing):
#   docker network create proxy
#
# Core stack only (DB + PostgREST + nginx UI on :${WEB_HOST_PORT:-8100}):
#   docker compose up --build -d
#
# Full stack incl. AI + gateway:
#   docker compose --profile ai --profile gateway up --build -d
#
# App (no Traefik): http://127.0.0.1:8100/  · PostgREST :3001 · gateway :8000
#
# To run the gateway without the model (mock responses), set AI_VISION_URL empty
# in a `.env` file next to this compose file, e.g. AI_VISION_URL=
#
# Local Angular: `npm run dev:db-api` then `npm start` (proxy: proxy.conf.js).
# Or one shot: `npm run start:docker-api`. Open http://localhost:4200
#
# Set STATIC_ASSET_BASE so the gateway can fetch MP4s from ng serve (not nginx `web`):
#   echo 'STATIC_ASSET_BASE=http://host.docker.internal:4200' >> .env
# (gateway includes extra_hosts so host.docker.internal resolves on Linux.)

services:
  db:
    image: postgres:17
    container_name: vireal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vireal
      POSTGRES_PASSWORD: vireal
      POSTGRES_DB: vireal
    # DB is not exposed to the public internet. Bind to localhost on the VM
    # so you can still tunnel in with `ssh -L 5442:localhost:5442 vm` if
    # you need psql / DBeaver access. Remove this whole block for full lockdown.
    ports:
      - "127.0.0.1:5442:5432"
    volumes:
      - vireal-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vireal -d vireal"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [vireal-net]

  api:
    image: postgrest/postgrest:v12.2.3
    container_name: vireal-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator@db:5432/vireal
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: https://vireal.club/api
      PGRST_SERVER_PORT: 3000
    expose:
      - "3000"
    # Local dev: expose PostgREST on the host so the Android app (emulator
    # via 10.0.2.2, or a physical device via the host's LAN / Tailscale IP)
    # can POST guest reports directly. Bound on all interfaces for dev
    # convenience — remove or restrict for shared machines.
    # Production traffic still goes through nginx /api/ in the `web` service.
    ports:
      - "3001:3000"
    networks: [vireal-net]

  # Optional Python gateway that fronts the AI vision service. Kept behind
  # the `gateway` profile because its source lives outside this repo
  # (../gateway) and isn't checked out on every deployment target. Start it
  # with `docker compose --profile gateway up -d` on machines that have the
  # sibling repo cloned; nginx proxies /gateway/* with lazy DNS so the web
  # container stays healthy when this service is absent.
  gateway:
    profiles: ["gateway"]
    build: ../gateway
    image: vireal-gateway:latest
    container_name: vireal-gateway
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      ai-vision:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      POSTGREST_URL: http://api:3000
      # In full stack, nginx `web` serves public/*. For `npm start`, set in .env:
      # STATIC_ASSET_BASE=http://host.docker.internal:4200
      STATIC_ASSET_BASE: ${STATIC_ASSET_BASE:-http://web}
      AI_VISION_URL: ${AI_VISION_URL:-http://ai-vision:8000}
      AI_FIRE_URL: ${AI_FIRE_URL:-http://ai-vision:8000}
      # Periodic analysis (seconds). 0 = disabled; use POST /gateway/analyze/{code} from UI.
      ANALYSIS_INTERVAL_SEC: ${ANALYSIS_INTERVAL_SEC:-0}
    expose:
      - "8000"
    # Local dev: expose gateway on the host for quick curling / running the
    # Angular app against a hosted gateway without Traefik. Public traffic
    # still goes through nginx /gateway/ in the `web` service.
    ports:
      - "127.0.0.1:8000:8000"
    networks: [vireal-net]

  # Optional AI vision service. Kept behind the `ai` profile because its
  # source lives outside this repo (../ai) and the model download is heavy;
  # most deployments use the gateway's mock responses instead. Start it with
  # `docker compose --profile ai up -d` (or together with gateway via
  # `--profile ai --profile gateway`).
  ai-vision:
    profiles: ["ai"]
    build:
      context: ../ai
      dockerfile: Dockerfile
    image: vireal-ai-vision:latest
    container_name: vireal-ai-vision
    restart: unless-stopped
    expose:
      - "8000"
    # Host tools / gateway-on-host: curl http://127.0.0.1:8001/health  →  set AI_VISION_URL=http://127.0.0.1:8001
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - vireal-hf-cache:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\", timeout=5)"',
        ]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 600s
    networks: [vireal-net]

  web:
    build: .
    image: vireal:latest
    container_name: vireal-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_URL: http://api:3000
    # Local dev: expose the Angular SPA on http://localhost:${WEB_HOST_PORT}
    # so we can open the dashboard without Traefik. In production the SPA
    # is reached via Traefik on :443 through the `proxy` network, so this
    # host binding is purely for convenience. Default 8100 avoids collisions
    # with Traefik's own :8080 dashboard on shared VMs; override via env.
    ports:
      - "8100:80"
    # Traefik's docker provider skips containers whose health status isn't
    # `healthy`. The Dockerfile's wget-based healthcheck has been flaky on
    # BusyBox and leaves the container stuck in `starting`, so disable it
    # at the compose layer and let the restart policy + Traefik handle it.
    healthcheck:
      disable: true
    networks:
      - vireal-net      # so nginx can proxy /api/ to the `api` service
      - proxy           # so Traefik on the host can route to it
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=proxy'

      - 'traefik.http.routers.vireal-web.rule=Host(`vireal.club`)'
      - 'traefik.http.routers.vireal-web.entrypoints=websecure'
      - 'traefik.http.routers.vireal-web.priority=100'
      - 'traefik.http.routers.vireal-web.tls.certresolver=le'

      - 'traefik.http.services.vireal-web.loadbalancer.server.port=80'

volumes:
  vireal-pgdata:
  vireal-hf-cache:

networks:
  vireal-net:
    driver: bridge
  proxy:
    external: true
    name: proxy
